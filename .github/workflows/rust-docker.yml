name: Build and Push Rust Service Docker Images to GHCR

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main ]
    paths:
    - 'crates/**'
    - '.dockerignore'
    - '.github/workflows/rust-docker.yml'
    - 'ci/Dockerfile.rust'
    - 'ci/rust-docker-target.sh'
    - 'Cargo.toml'
    - 'Cargo.lock'
    - 'rust-toolchain.toml'

jobs:
  build-and-push:
    name: 'rust docker build and push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        if: ${{ !env.ACT }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build Rust binaries
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ci/Dockerfile.rust
          push: false
          outputs: .docker-bin

      - name: Tag and push per-binary images
        run: |
          tag=${{ github.sha }} \
          branch=main \
          push=true \
          ci/rust-docker-target.sh
