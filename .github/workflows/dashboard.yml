name: Build dashboard Docker image

on:
  push:
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard.yml'

jobs:
  build:
    name: 'dashboard docker build'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}
      - uses: actions/checkout@v4
      - run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          # https://github.com/docker/build-push-action/issues/378
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dashboard:${{ env.BRANCH_NAME }}
            ghcr.io/${{ github.repository_owner }}/dashboard:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/dashboard:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dashboard:${{ env.BRANCH_NAME }}
          cache-to: type=inline
